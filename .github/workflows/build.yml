# GitHub Actions: Build .py → .exe via PyInstaller
name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") {
            Get-Content "requirements.txt" | ForEach-Object {
              $pkg = $_.Trim()
              if ($pkg -and $pkg -notmatch '^#') {
                pip install $pkg
              }
            }
          }
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          $files = @(Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "*.py" -Recurse | Where-Object { $_.Name -ne "setup.py" })
          foreach ($f in $files) {
            $name = [System.IO.Path]::GetFileNameWithoutExtension($f.Name)
            pyinstaller `
              --onefile --console `
              --name "${name}.exe" `
              --distpath dist `
              --workpath "$env:RUNNER_TEMP/pyinstaller" `
              --collect-all openpyxl `
              --collect-all et_xmlfile `
              --hidden-import openpyxl `
              --hidden-import et_xmlfile `
              --exclude-module IPython `
              --exclude-module matplotlib `
              --exclude-module numpy `
              --exclude-module pandas `
              --exclude-module pillow `
              --exclude-module scipy `
              --exclude-module sklearn `
              --exclude-module tensorflow `
              --exclude-module torch `
              "$($f.FullName)" 2>&1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-exe
          path: dist/*.exe
          if-no-files-found: error
